<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Shield | Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-4xl font-bold mb-2 text-emerald-400">Budget Shield 🛡️</h1>
        <p class="text-slate-400 mb-8">Track your spending, protect your savings.</p>

        <div class="bg-slate-800 p-6 rounded-2xl mb-8 border border-slate-700 shadow-xl">
            <h2 class="text-sm uppercase tracking-widest text-slate-500 font-semibold">Total Expenses</h2>
            <p class="text-5xl font-extrabold text-white mt-2">${{ "%.2f"|format(total) }}</p>
        </div>

        <form method="POST" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <input type="text" name="item" placeholder="Item Name" class="bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-emerald-500" required>
            <input type="number" step="0.01" name="amount" placeholder="Amount" class="bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-none focus:border-emerald-500" required>
            <select name="category" class="bg-slate-900 border border-slate-700 p-3 rounded-lg focus:outline-none">
                <option value="Food">Food</option>
                <option value="Rent">Rent</option>
                <option value="Entertainment">Fun</option>
                <option value="Misc">Misc</option>
            </select>
            <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold p-3 rounded-lg transition">Add +</button>
        </form>

        <div class="space-y-4">
            {% for expense in expenses %}
            <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border-l-4 border-emerald-500">
                <div>
                    <h3 class="font-bold text-lg">{{ expense.item }}</h3>
                    <span class="text-xs text-slate-500 bg-slate-900 px-2 py-1 rounded">{{ expense.category }}</span>
                </div>
                <div class="text-xl font-mono text-emerald-400">-${{ "%.2f"|format(expense.amount) }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
